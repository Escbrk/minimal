<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!--? FONTS  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!--? NORMALIZE  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
      integrity="sha512-4xo8blKMVCiXpTaLzQSLSw3KFOVPWhm/TRtuPVc4WG6kUgjH6J03IBuG7JZPkcWMxJ5huwaBpOpnwYElP/m6wg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!--? STYLES -->
    <link rel="stylesheet" href="./src/css/styles.css" />
    <link rel="stylesheet" href="./src/css/media.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-container container">
        <div class="header-logo-container">
          <a class="logo-link" href="./index.html"
            ><svg class="logo" width="100" height="16">
              <use href="./src/images/icons.svg#icon-logo"></use></svg
          ></a>
        </div>
        <nav class="header-navigation">
          <ul class="header-nav-list">
            <li class="header-nav-item">
              <a class="header-nav-link" href="#">About us</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#">Our products</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#">Prices</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#">Bestsellers</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#">Reviews</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#">Contacts</a>
            </li>
          </ul>
        </nav>

        <!--? MOBILE MENU  -->
        <button type="button" class="mob-menu-open-btn" data-menu-open>
          <svg class="mob-menu-open-icon" width="32" height="32">
            <use href="./src/images/icons.svg#icon-burger-menu"></use>
          </svg>
        </button>

        <div class="mob-menu is-hidden" data-menu>
          <div class="mob-header">
            <div class="mob-logo-container container">
              <a class="logo-link" href="./index.html"
                ><svg class="logo" width="100" height="16">
                  <use href="./src/images/icons.svg#icon-logo"></use></svg
              ></a>
              <button class="close-menu-btn" type="button" data-menu-close>
                <svg width="32" height="32">
                  <use href="./src/images/icons.svg#icon-close-menu"></use>
                </svg>
              </button>
            </div>
          </div>
          

          <ul class="mob-nav-list">
            <li class="mob-nav-item">
              <a class="mob-nav-link" href="#">About us</a>
            </li>
            <li class="mob-nav-item">
              <a class="mob-nav-link" href="#">Our products</a>
            </li>
            <li class="mob-nav-item">
              <a class="mob-nav-link" href="#">Prices</a>
            </li>
            <li class="mob-nav-item">
              <a class="mob-nav-link" href="#">Bestsellers</a>
            </li>
            <li class="mob-nav-item">
              <a class="mob-nav-link" href="#">Reviews</a>
            </li>
            <li class="mob-nav-item">
              <a class="mob-nav-link" href="#">Contacts</a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <script src="./src/js/mobile-menu.js"></script>
  </body>
</html>
